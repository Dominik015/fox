<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <label for="align-content">align-content:</label>
    <select id="align-content" onchange="AlignContent()">
        <option>center</option>
        <option>end</option>
        <option>flex-start</option>
        <option>flex-end</option>
    </select>
    <label for="align-items">align-items:</label>
    <select id="align-items" onchange="AlignItems()">
        <option>center</option>
        <option>end</option>
        <option>flex-start</option>
        <option>flex-end</option>
    </select>
    <container id="container">
        <img src="Arctic Fox PNG 18.png">
        <img src="Arctic Fox PNG 19.png">
        <img src="Arctic Fox PNG 23.png">

    </container>
    <script src="script.js"></script>   
</body>
</html>
